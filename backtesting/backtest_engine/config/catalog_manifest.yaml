catalog:
- country: USA
  iso_alpha3: USA
  dataset: wages_and_employment
  status: READY
  vault_product: wages_and_employment
  vault_source: alfred_vintage
  value_col: observed_value
  series:
  - PAYEMS
  - USPRIV
  - UNRATE
  - CES0500000003
  - MANEMP
  - USCONS
  - USEHS
  - USFIRE
  - USGOVT
  - USINFO
  - USLAH
  - USTRADE
  backtest_start: '1990-01-01'
  backtest_end: '2025-12-31'
  notes: 'ALFRED vintage history from 1955 for PAYEMS, 1960 for UNRATE. CES0500000003
    vintage history only available from 2011-03-04 -- WagesStrategy uses PAYEMS fallback
    path before that date. WagesStrategy also requires CPIAUCSL from global_macro
    dataset; catalog_runner merges both datasets automatically.

    '
- country: USA
  iso_alpha3: USA
  dataset: housing
  status: READY
  vault_product: Housing_Supply_and_Shelf_Inflation
  vault_source: alfred_vintage
  value_col: observed_value
  series:
  - PERMIT
  - PERMIT1
  - PERMIT5
  - CUUR0000SEHA
  - CUUR0000SAH1
  - CUSR0000SEHA
  - CUSR0000SAH1
  - CUUR0000SEHB
  - CUSR0000SEHB
  backtest_start: '1999-01-01'
  backtest_end: '2025-12-31'
  notes: PERMIT ALFRED vintage from 1999; CPI shelter ALFRED from 2011
- country: USA
  iso_alpha3: USA
  dataset: global_macro
  status: READY
  vault_product: global_macro
  vault_source: alfred_vintage
  value_col: observed_value
  series:
  - GDP
  - GDPC1
  - INDPRO
  - CPIAUCSL
  - CPIAUCNS
  - UNRATE
  - PAYEMS
  - FEDFUNDS
  - GS10
  - PCEPI
  backtest_start: '1991-01-01'
  backtest_end: '2025-12-31'
  notes: 'ALFRED GDP from 1991; INDPRO from 1927. GDPC1 preliminary estimates (v1)
    available within ~30 days of quarter-end. MacroStrategy runs in latest_available
    mode by default; preliminary mode available for bias-analysis runs.

    '
- country: USA
  iso_alpha3: USA
  dataset: food_pricing
  status: READY
  vault_product: food_micropricing
  vault_source: alfred_vintage
  value_col: observed_price_local
  series:
  - APU0000701111
  - APU0000702111
  - APU0000702421
  - APU0000706111
  - APU0000706211
  - APU0000708111
  - APU0000711111
  - APU0000711412
  - APU0000712111
  - APU0000717111
  - APU0000717311
  backtest_start: '1980-01-01'
  backtest_end: '2025-12-31'
  notes: 'ALFRED PIT vintage history from 2019 (post-retrofit). Pre-2019 rows use
    BLS release-calendar backfill and write values to observed_price_local directly.
    USALoader normalises both sources into observed_price_local. Revision depth is
    low pre-2019.

    '
- country: USA
  iso_alpha3: USA
  dataset: trade_flows
  status: READY
  vault_product: trade_flows
  vault_source: alfred_vintage
  value_col: observed_value
  series:
  - BOPGSTB
  backtest_start: '1997-01-01'
  backtest_end: '2025-12-31'
  notes: 'BOPGSTB ALFRED vintage history from 1997. HS-chapter soybean series (HS12)
    ingested separately but without ALFRED vintage history -- TradeStrategy uses BOPGSTB
    aggregate only.

    '
