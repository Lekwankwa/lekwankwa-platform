# ===========================================================================
# KNOWN GAPS
# ---------------------------------------------------------------------------
# Documented gaps that are PERMANENT and must not surface as DATA_GAP or
# FRESHNESS findings. Each entry records the BLS API evidence so the absence
# can be explained to clients and auditors without re-querying the BLS API.
#
# How quality_report_generator.py uses this block:
#   Any period listed here is excluded from COVERAGE and FRESHNESS checks
#   for the named series. Gaps not covered by this block are still flagged.
#
# Maintenance: add an entry whenever a series misses a scheduled release
# for a documented, permanent reason (government lapse, series discontinuation,
# agency-declared data unavailability). Do NOT use for routine lateness.
# ===========================================================================

known_gaps:

  # ---------------------------------------------------------------------------
  # 2025 US Government Lapse in Appropriations — October 2025
  # ---------------------------------------------------------------------------
  # The US federal government operated without appropriations in late October
  # 2025.  BLS was unable to collect or publish data for the October reference
  # month.  All affected series returned value "-" from the BLS public API with
  # footnote codes 9 (Employment Situation series) or X (CPI / price series).
  #
  # BLS confirmation queries run 2026-06-25:
  #   LNS14000000  → M10 value="-"  footnote code 9
  #   APU0000701111 → M10 value="-"  footnote code X
  #   CUUR0000SEHA  → M10 value="-"  footnote code X
  #   CUSR0000SEHA  → M10 value="-"  footnote code X
  #   CES0500000003 → M10 value="36.85"  NO footnote (NOT affected — published normally)
  #
  # November 2025 values confirm all affected series resumed normally.
  # BLS does not retroactively publish data for lapse periods.
  # ---------------------------------------------------------------------------

  - gap_id: "BLS_2025_APPROPRIATIONS_LAPSE"
    period: "2025-10"
    permanent: true
    backfill_expected: false
    confirmed_date: "2026-06-25"
    reason: "Data unavailable due to 2025 lapse in appropriations"
    bls_footnote_codes: ["9", "X"]
    bls_api_value: "-"
    note: >
      BLS does not retroactively publish data for lapse periods.
      November 2025 values confirm all series resumed normally after the
      lapse ended.  CES0500000003 (avg hourly earnings) was NOT affected
      and has a real October 2025 value (36.85).
    vault_actions_taken:
      - "DELETED: wages_and_employment/USA/bls_cps/year=2025/month=10 (empty folder)"
      - "DELETED: Housing_Supply_and_Shelter_Inflation/USA/bls_cpi_shelter/year=2025/month=10 (NaN parquet, all 7 observed_values null)"
      - "ABSENT (never created): food_micropricing/USA/bls/year=2025/month=10 (scraper correctly wrote nothing for '-' values)"
    affected_series:

