# catalog_expected_series.yaml — Lekwankwa Corporation
# =====================================================
# Authoritative list of series that MUST exist in the vault.
#
# On every quality report run, this manifest is diffed against the live vault.
# Any entry with fewer distinct months than min_months surfaces as a
# CRITICAL DATA_GAP finding, separate from FRESHNESS/VALIDATION findings.
#
# This check exists because freshness monitoring cannot detect a series that
# was never ingested — it only flags staleness on series that were once present.
# DATA_GAP catches the complementary failure mode: a series that is required
# by a strategy but has never been loaded.
#
# Canonical example that prompted this file (June 2026):
#   wages_and_employment/USA/CES0500000003  — avg hourly earnings
#   Housing_Supply_and_Shelter_Inflation/USA/CUSR0000SAH1 — shelter CPI
#   Both were listed in catalog_manifest.yaml but were absent from the vault.
#   Strategies 10 and 12 could not run as a result.
#
# Schema
# ------
# product        : vault product key (matches hive partition product=)
# country        : ISO-3166-1 alpha-3 (matches hive partition country=)
# series_id      : sovereign_series_id value to check, OR null to check partition
#                  presence only (used for Eurostat SDMX whole-product checks)
# source         : vault source name (hive partition source=); null = any source
# value_col      : expected value column (observed_value | observed_price_local)
# min_months     : minimum distinct observation months required in the vault
# backtest_start : earliest month the strategy needs; used to anchor gap severity
# required_by    : list of strategy numbers that depend on this series
# notes          : human-readable context
#
# Severity rules (applied by quality_report_generator.py):
#   months_found == 0            → CRITICAL (series completely absent)
#   months_found < min_months    → HIGH     (series present but sparse)
#   months_found >= min_months   → OK (no finding emitted)
#
# Maintenance
# -----------
# Update this file when new series are ingested (increase min_months to reflect
# expected coverage depth), or when a new strategy requires a series that was
# not previously checked.
#
# version: "1.0"
# generated: "2026-06-24"

