# Lekwankwa Corporation — Universal Schema Standard
# Source of truth for all field names across the backtest engine.
# Every module in backtest_engine references this file; no field names
# are hardcoded elsewhere.
#
# Version: 5.0 (PIT-Enabled, Gold Standard)
# Effective: 2026-06-16

version: "5.0"

# ── Core PIT fields (mandatory for backtesting) ──────────────────────────────
pit_fields:
  data_vintage_id:
    type: string
    nullable: false
    description: "Unique vintage key: {SOURCE}-{SERIES_ID}-{YYYY-MM}-v{N}"
    example: "BLS-APU0000701111-2024-03-v1"

  official_release_date:
    type: date
    nullable: false
    description: "Date the source agency published this specific vintage"
    example: "2024-04-12"
    constraint: "Must be >= data_timestamp date"

  as_of_date:
    type: timestamp_utc
    nullable: false
    description: "UTC timestamp when this version entered the vault"
    example: "2024-04-12T13:00:00Z"

  published_date:
    type: date
    nullable: true
    description: "Alias for official_release_date; used in some legacy partitions"
    example: "2024-04-12"

  is_revised_figure:
    type: boolean
    nullable: false
    description: "False for v1 (preliminary), True for v2 and beyond"
    example: false

  revision_number:
    type: integer
    nullable: false
    description: "1-based version counter (1=preliminary, 2+=revision)"
    example: 1
    constraint: ">= 1"

  superseded_by:
    type: string
    nullable: true
    description: "data_vintage_id of next revision; null if current"
    example: "BLS-APU0000701111-2024-03-v2"

# ── Identification fields ─────────────────────────────────────────────────────
id_fields:
  record_id:
    type: string
    nullable: true
    description: "System-generated UUID for the row"

  sovereign_series_id:
    type: string
    nullable: false
    description: "Source agency's canonical series identifier"
    example: "APU0000701111"

  source_series_id:
    type: string
    nullable: true
    description: "Internal alias used by the scraper"
    example: "APU0000701111"

  dataset_id:
    type: string
    nullable: true
    description: "BLS dataset grouping identifier"
    example: "AP"

# ── Geographic fields ─────────────────────────────────────────────────────────
geo_fields:
  iso_alpha3:
    type: string
    nullable: false
    description: "ISO 3166-1 alpha-3 country code"
    example: "USA"

  country_code:
    type: string
    nullable: true
    description: "ISO 3166-1 alpha-2 country code"
    example: "US"

  country_name:
    type: string
    nullable: true
    description: "Full English country name"
    example: "United States"

  market_tier:
    type: string
    nullable: true
    description: "Developed | Emerging | Frontier"
    example: "Developed"

# ── Source provenance fields ──────────────────────────────────────────────────
provenance_fields:
  source:
    type: string
    nullable: false
    description: "Vault source partition key"
    example: "alfred_vintage"

  source_agency:
    type: string
    nullable: false
    description: "Originating government agency"
    example: "BLS"

  source_sub_category:
    type: string
    nullable: true
    description: "Sub-dataset within agency"
    example: "CPI"

  portal_url:
    type: string
    nullable: true
    description: "URL of data source portal"
    example: "https://alfred.stlouisfed.org/"

  release_frequency:
    type: string
    nullable: true
    description: "Monthly | Quarterly | Annual | Weekly"
    example: "Monthly"

  extraction_method:
    type: string
    nullable: true
    description: "How the data was obtained"
    example: "ALFRED_API"

  confidence_tier:
    type: string
    nullable: false
    description: "PRIMARY | SECONDARY | DERIVED. Forward-filled or interpolated values must be DERIVED."
    example: "PRIMARY"
    controlled_vocabulary:
      PRIMARY: "Native release from source agency at reported frequency"
      SECONDARY: "Derived from a secondary or less authoritative source"
      DERIVED: "Computed, interpolated, or forward-filled from a PRIMARY series"

  data_quality_certified:
    type: boolean
    nullable: true
    description: "True if passed gold-standard validation. Must be false for DERIVED records."
    example: true

  source_system:
    type: string
    nullable: true
    description: "ALFRED | BLS_CALENDAR_FALLBACK | LIVE_REVISION_DETECTOR"
    example: "ALFRED"

  is_interpolated:
    type: boolean
    nullable: false
    description: >
      True when observed_value was not directly reported by the source agency but was
      generated by interpolation or carry-forward. False for all genuine observations.
      Must be True for all DERIVED records produced by gap-fill pipelines.
    example: false
    field_presence: >
      Present in parquet files that contain any fill or carry-forward records:
      permits_eu27_data (14 quarterly-publisher EU countries), hpi_monthly_fill,
      wages_empl_monthly_fill, trade_exports_fill, trade_imports_fill.
      Intentionally absent from files where no fill records are generated
      (monthly-publisher partitions, USA, non-EU countries) — those files use
      data_status or confidence_tier alone.
    invariant: >
      When the field IS present in a file, the value is always explicitly True or False.
      None / null is not a valid value. Readers may safely use WHERE is_interpolated = False
      to select genuine observations; no IS NOT TRUE or nullable-boolean workaround is needed.
      This invariant was established by vault backfill in June 2026 after confirming
      ingest_permits_quarterly_14.py had omitted these keys for genuine rows (causing
      pd.concat to produce None via NaN-fill), and by fixing the scraper to set them
      explicitly.

  interpolation_method:
    type: string
    nullable: true
    description: "Method used when is_interpolated=True. QUARTERLY_CARRY_FORWARD | LINEAR_INTERPOLATION | SEASONAL_ADJUSTMENT_FILL"
    example: "QUARTERLY_CARRY_FORWARD"
    constraint: "Required when is_interpolated=True. Null when is_interpolated=False."

# ── Temporal fields ───────────────────────────────────────────────────────────
temporal_fields:
  data_timestamp:
    type: timestamp_utc
    nullable: false
    description: "ISO 8601 first-of-month for the observation period"
    example: "2024-03-01T00:00:00Z"

  reporting_date:
    type: date
    nullable: true
    description: "YYYY-MM-DD date string form of data_timestamp"
    example: "2024-03-01"

  observation_period:
    type: string
    nullable: true
    description: "YYYY-MM string for the observation period"
    example: "2024-03"

  conversion_timestamp:
    type: timestamp_utc
    nullable: true
    description: "When the scraper wrote this row"
    example: "2026-06-16T13:00:00Z"

# ── Value fields ──────────────────────────────────────────────────────────────
value_fields:
  observed_value:
    type: float64
    nullable: true
    description: "Numeric value for macro/employment/housing datasets"
    example: 158423.0

  observed_price_local:
    type: float64
    nullable: true
    description: "Price in local currency (food pricing datasets)"
    example: 1.23

  price_usd_equivalent:
    type: float64
    nullable: true
    description: "Price converted to USD"
    example: 1.23

  unit_of_measure:
    type: string
    nullable: true
    description: "Unit for observed_value"
    example: "THOUSANDS"

  currency:
    type: string
    nullable: true
    description: "ISO 4217 currency code"
    example: "USD"

  fx_rate_applied:
    type: float64
    nullable: true
    description: "FX rate used for USD conversion"
    example: 1.0

  fx_rate_date:
    type: date
    nullable: true
    description: "Date of FX rate applied"
    example: "2024-03-31"

# ── Metric descriptor fields ──────────────────────────────────────────────────
descriptor_fields:
  macro_metric_name:
    type: string
    nullable: true
    description: "Human-readable metric name"
    example: "TOTAL_NONFARM_PAYROLLS"

  standard_name:
    type: string
    nullable: true
    description: "Canonical product/item name"
    example: "Ground Beef"

  local_name:
    type: string
    nullable: true
    description: "Source's native name for the item"
    example: "Ground chuck, 100% beef, per lb."

  category:
    type: string
    nullable: true
    description: "Top-level category grouping"
    example: "Meat & Poultry"

  global_coicop_code:
    type: string
    nullable: true
    description: "UN COICOP classification code"
    example: "01.1.1.1"

  seasonal_adjustment:
    type: string
    nullable: true
    description: "SA | NSA | SAAR"
    example: "SA"

  industry_code:
    type: string
    nullable: true
    description: "BLS CES industry code"
    example: "CES0000000001"

  industry_name:
    type: string
    nullable: true
    description: "Industry description"
    example: "Total Nonfarm"

# ── Trade-specific fields ─────────────────────────────────────────────────────
trade_fields:
  trade_flow:
    type: string
    nullable: true
    description: "EXPORT | IMPORT | NET"
    example: "NET"

  commodity_code:
    type: string
    nullable: true
    description: "HS chapter or commodity code"
    example: "HS27"

  commodity_name:
    type: string
    nullable: true
    description: "Commodity description"
    example: "Mineral fuels and oils"

  partner_country_code:
    type: string
    nullable: true
    description: "ISO alpha-3 of trade partner"
    example: "WLD"

  partner_country_name:
    type: string
    nullable: true
    description: "Trade partner name"
    example: "World"

# ── Misc / legacy fields ──────────────────────────────────────────────────────
misc_fields:
  pct_change_mom:
    type: float64
    nullable: true
    description: "Month-over-month % change"
    example: 0.5

  bls_raw_price:
    type: float64
    nullable: true
    description: "Raw price as returned by BLS API"
    example: 1.0803

  bls_unit:
    type: string
    nullable: true
    description: "Unit string from BLS API response"
    example: "per lb."

  data_version:
    type: string
    nullable: true
    description: "Schema version tag"
    example: "5.0"

  is_forecast:
    type: boolean
    nullable: true
    description: "True for IMF WEO forecast years"
    example: false

  sdmx_frequency:
    type: string
    nullable: true
    description: "SDMX frequency code: M | Q | A"
    example: "M"

  product:
    type: string
    nullable: true
    description: "Vault product partition key"
    example: "global_macro"

  unit_quantity_standardized:
    type: float64
    nullable: true
    description: "Quantity in standardized units (kg)"
    example: 0.4536

  unit_measure_standardized:
    type: string
    nullable: true
    description: "Standardized unit label"
    example: "kg"

  internal_item_id:
    type: string
    nullable: true
    description: "Internal item identifier"
    example: "STAPLE-02"

# ── Source-specific fields ────────────────────────────────────────────────────
#
# These fields exist only in vault partitions for specific source agencies.
# They are absent from other partitions for the same product.
#
# Official handling rule (effective 2026-06-20):
#   When reading multiple countries or sources into a single DataFrame, any
#   source-specific column that is absent from a given row's source partition
#   MUST be coerced to None (pd.NA / null) — not excluded from the output
#   and not treated as an error.  This keeps a consistent column set across
#   all delta files regardless of source country or data provider, while
#   correctly representing that a given field is not applicable to that source.
#
#   Implementors: use pd.concat(frames, ignore_index=True) which aligns on
#   column name and fills gaps with NaN automatically, then explicitly call
#   .reindex(columns=CANONICAL_COLS) to materialise any remaining absent
#   columns as None before writing output parquet files.
#
source_specific_fields:

  # ── Australia (ABS — Australian Bureau of Statistics) ─────────────────────
  abs_key:
    type: string
    nullable: true
    source_countries: ["AUS"]
    description: "ABS series identifier (e.g. A2325807C)"

  abs_dataflow:
    type: string
    nullable: true
    source_countries: ["AUS"]
    description: "ABS SDMX dataflow ID (e.g. ABS_RPPI_2)"

  abs_series_id:
    type: string
    nullable: true
    source_countries: ["AUS"]
    description: "ABS internal series reference used by the scraper"

  # ── Canada (Statistics Canada) ────────────────────────────────────────────
  statcan_vector:
    type: string
    nullable: true
    source_countries: ["CAN"]
    description: "StatCan vector ID (e.g. v41690973)"

  statcan_table_id:
    type: string
    nullable: true
    source_countries: ["CAN"]
    description: "StatCan product / table ID"

  statcan_product_id:
    type: string
    nullable: true
    source_countries: ["CAN"]
    description: "StatCan product code (alias for statcan_table_id in some pipelines)"

  # ── United Kingdom (ONS — Office for National Statistics) ─────────────────
  ons_cdid:
    type: string
    nullable: true
    source_countries: ["GBR"]
    description: "ONS CDID series code (e.g. ABMI)"

  # ── Norway (SSB — Statistics Norway) ─────────────────────────────────────
  ssb_table_id:
    type: string
    nullable: true
    source_countries: ["NOR"]
    description: "SSB StatBank table identifier (e.g. 03013)"

  # ── United States — BLS and USDA/ERS pipelines ────────────────────────────
  bls_footnotes:
    type: string
    nullable: true
    source_countries: ["USA"]
    description: "BLS API footnote codes for the observation"

  bls_raw_price:
    type: float64
    nullable: true
    source_countries: ["USA"]
    description: "Raw price value as returned by BLS API before any transformation"

  bls_unit:
    type: string
    nullable: true
    source_countries: ["USA"]
    description: "Unit string from BLS API response (e.g. 'per lb.')"

  metric_value:
    type: float64
    nullable: true
    source_countries: ["USA"]
    description: "Alias for observed_value used in BLS CPI shelter records"

  # ── United States — Census Bureau (BPS and FT-900) ───────────────────────
  record_id:
    type: string
    nullable: true
    source_countries: ["USA"]
    description: "UUID generated at scrape time for Census trade records"

  source_url:
    type: string
    nullable: true
    source_countries: ["USA"]
    description: "Source URL for Census FT-900 trade records"

  geo_level:
    type: string
    nullable: true
    source_countries: ["USA"]
    description: "Geographic aggregation level for Census BPS records (e.g. 'national')"

  geo_id:
    type: string
    nullable: true
    source_countries: ["USA"]
    description: "Census geographic identifier (e.g. 'US')"

  bps_variable:
    type: string
    nullable: true
    source_countries: ["USA"]
    description: "Census BPS variable code (e.g. 'PERMIT', 'PERMIT1', 'PERMIT5')"

  # ── EU27 — Eurostat SDMX pipelines ────────────────────────────────────────
  sdmx_dataflow:
    type: string
    nullable: true
    source_countries: ["EU27"]
    description: "Eurostat SDMX dataflow ID (e.g. 'prc_hicp_midx', 'sts_cobp_m')"

  observation_period:
    type: string
    nullable: true
    source_countries: ["EU27"]
    description: "SDMX observation period code in YYYY-MM or YYYY-QN format"

  # sdmx_frequency is shared with some non-EU pipelines but originates from SDMX
  # (already defined in misc_fields above as a standard nullable field)

  # ── Cross-source fields present in some but not all pipelines ─────────────
  source_system:
    type: string
    nullable: true
    source_countries: ["USA", "EU27"]
    description: "Pipeline subsystem identifier (e.g. 'ALFRED', 'BLS_CALENDAR_FALLBACK', 'LIVE_REVISION_DETECTOR')"
    note: "Already defined in provenance_fields; duplicated here as a reminder that it is absent from non-EU/non-USA partitions."

# ── Backtesting-specific computed fields (not stored in vault) ─────────────────
backtest_computed:
  signal:
    type: float64
    description: "Strategy signal: -1.0 (short) to +1.0 (long)"

  position:
    type: float64
    description: "Current portfolio position in signal units"

  pnl_daily:
    type: float64
    description: "Mark-to-market P&L for the period"

  pit_violation:
    type: boolean
    description: "True if engine detected future data access"
